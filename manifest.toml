packaging_format = 2

id = "3x-ui"
name = "3x-ui"
description.en = "Web panel for Xray"
description.fr = "Panneau web pour Xray"

version = "2.8.11~ynh1"

maintainers = ["vladeecom"]

[upstream]
license = "GPL-3.0"
website = "https://github.com/MHSanaei/3x-ui"
code = "https://github.com/MHSanaei/3x-ui"
userdoc = "https://github.com/MHSanaei/3x-ui/wiki"
admindoc = "https://github.com/MHSanaei/3x-ui/wiki/Installation"

[integration]
yunohost = ">= 12.0"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf", "armel", "i386", "s390x"]
multi_instance = false
ldap = "not_relevant"
sso = "not_relevant"
disk = "200M"
ram.build = "100M"
ram.runtime = "200M"

[install.domain]
type = "domain"

[install.path]
type = "path"
default = "/"

[install.init_main_permission]
type = "group"
default = "visitors"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/MHSanaei/3x-ui/releases/download/v2.8.11/x-ui-linux-amd64.tar.gz"
    amd64.sha256 = "0abee91cf50154d2ffe079d972090209c59cb930f3b4c3131f435923bcb60f52"

    arm64.url = "https://github.com/MHSanaei/3x-ui/releases/download/v2.8.11/x-ui-linux-arm64.tar.gz"
    arm64.sha256 = "125f3a195e5fa2b1316821a74b3a04295c9a54acd3dd30c572d3fee86314a96c"

    armhf.url = "https://github.com/MHSanaei/3x-ui/releases/download/v2.8.11/x-ui-linux-armv7.tar.gz"
    armhf.sha256 = "2656839923a8fd25e26458c60d7d612af8401ed5da0e26e668d74fd730d3f311"

    armel.url = "https://github.com/MHSanaei/3x-ui/releases/download/v2.8.11/x-ui-linux-armv5.tar.gz"
    armel.sha256 = "70c1dd8d9682b9f1469d56863fd824716fa1931e570d915dccf9fc6b40c33e4a"

    i386.url = "https://github.com/MHSanaei/3x-ui/releases/download/v2.8.11/x-ui-linux-386.tar.gz"
    i386.sha256 = "6a0cdf833ed1fe56e8a5706ba1b1ed41600dd0517095cd355077b0f608b5adc9"

    s390x.url = "https://github.com/MHSanaei/3x-ui/releases/download/v2.8.11/x-ui-linux-s390x.tar.gz"
    s390x.sha256 = "c4d3084093ae4b34177b3b09be752689f6a007fce5001a8a4158e052c754a5f5"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.ports]
    main.default = 20530

    [resources.permissions]
    main.url = "/"
